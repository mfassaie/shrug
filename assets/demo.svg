<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 680" width="860" height="680">
  <style>
    .bg { fill: #282a36; }
    .border { fill: none; stroke: #44475a; stroke-width: 1; }
    .title-bar { fill: #21222c; }
    .dot-red { fill: #ff5555; }
    .dot-yellow { fill: #f1fa8c; }
    .dot-green { fill: #50fa7b; }
    .prompt { fill: #50fa7b; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 13px; }
    .cmd { fill: #f8f8f2; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 13px; }
    .output { fill: #6272a4; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 12px; }
    .highlight { fill: #bd93f9; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 12px; }
    .string { fill: #f1fa8c; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 12px; }
    .key { fill: #8be9fd; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 12px; }
    .comment { fill: #6272a4; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 11px; font-style: italic; }
  </style>

  <!-- Window frame -->
  <rect class="bg" width="860" height="680" rx="10"/>
  <rect class="border" x="0.5" y="0.5" width="859" height="679" rx="10"/>

  <!-- Title bar -->
  <rect class="title-bar" width="860" height="36" rx="10"/>
  <rect class="title-bar" y="26" width="860" height="10"/>
  <circle class="dot-red" cx="20" cy="18" r="6"/>
  <circle class="dot-yellow" cx="40" cy="18" r="6"/>
  <circle class="dot-green" cx="60" cy="18" r="6"/>
  <text x="430" y="22" text-anchor="middle" class="output" font-size="12">shrug — terminal</text>

  <!-- Line 1: Help command -->
  <text x="20" y="65" class="prompt">$</text>
  <text x="35" y="65" class="cmd">shrug --help</text>

  <!-- Help output -->
  <text x="20" y="85" class="output">A dynamic CLI for Atlassian Cloud</text>
  <text x="20" y="102" class="output">Commands:</text>
  <text x="20" y="118" class="highlight">  jira            </text><text x="165" y="118" class="output">Jira Cloud operations</text>
  <text x="20" y="134" class="highlight">  jira-software    </text><text x="165" y="134" class="output">Jira Software operations (boards, sprints, backlogs)</text>
  <text x="20" y="150" class="highlight">  confluence       </text><text x="165" y="150" class="output">Confluence operations</text>
  <text x="20" y="166" class="highlight">  auth             </text><text x="165" y="166" class="output">Authentication management (set-token, status)</text>
  <text x="20" y="182" class="highlight">  profile          </text><text x="165" y="182" class="output">Profile management (create, list, show, delete, use)</text>

  <!-- Line 2: Create Jira issue -->
  <text x="20" y="212" class="comment"># Create a Jira issue</text>
  <text x="20" y="230" class="prompt">$</text>
  <text x="35" y="230" class="cmd">shrug --output json --json '{"fields":{"project":{"key":"PROJ"},</text>
  <text x="35" y="246" class="cmd">  "summary":"Fix login bug","issuetype":{"name":"Task"}}}' jira issues create-issue</text>

  <text x="20" y="270" class="output">{</text>
  <text x="20" y="286" class="key">  "id"</text><text x="55" y="286" class="output">: </text><text x="65" y="286" class="string">"10305"</text><text x="120" y="286" class="output">,</text>
  <text x="20" y="302" class="key">  "key"</text><text x="62" y="302" class="output">: </text><text x="72" y="302" class="string">"PROJ-42"</text><text x="145" y="302" class="output">,</text>
  <text x="20" y="318" class="key">  "self"</text><text x="68" y="318" class="output">: </text><text x="78" y="318" class="string">"https://mysite.atlassian.net/rest/api/3/issue/10305"</text>
  <text x="20" y="334" class="output">}</text>

  <!-- Line 3: List Confluence pages -->
  <text x="20" y="364" class="comment"># List Confluence pages</text>
  <text x="20" y="382" class="prompt">$</text>
  <text x="35" y="382" class="cmd">shrug --output json confluence page get-pages</text>

  <text x="20" y="406" class="output">{</text>
  <text x="20" y="422" class="key">  "results"</text><text x="93" y="422" class="output">: [</text>
  <text x="20" y="438" class="output">    {</text><text x="50" y="438" class="key">"id"</text><text x="78" y="438" class="output">: </text><text x="85" y="438" class="string">"196700"</text><text x="145" y="438" class="output">, </text><text x="155" y="438" class="key">"title"</text><text x="200" y="438" class="output">: </text><text x="210" y="438" class="string">"Getting started"</text><text x="345" y="438" class="output">},</text>
  <text x="20" y="454" class="output">    {</text><text x="50" y="454" class="key">"id"</text><text x="78" y="454" class="output">: </text><text x="85" y="454" class="string">"229485"</text><text x="145" y="454" class="output">, </text><text x="155" y="454" class="key">"title"</text><text x="200" y="454" class="output">: </text><text x="210" y="454" class="string">"Product roadmap"</text><text x="345" y="454" class="output">},</text>
  <text x="20" y="470" class="output">    ...</text>
  <text x="20" y="486" class="output">  ]</text>
  <text x="20" y="502" class="output">}</text>

  <!-- Line 4: Search with JQL -->
  <text x="20" y="532" class="comment"># Search issues with JQL shorthand</text>
  <text x="20" y="550" class="prompt">$</text>
  <text x="35" y="550" class="cmd">shrug --project PROJ --assignee me --status "In Progress" jira issues</text>

  <!-- Line 5: Shell completions -->
  <text x="20" y="580" class="comment"># Generate shell completions</text>
  <text x="20" y="598" class="prompt">$</text>
  <text x="35" y="598" class="cmd">shrug completions bash &gt; ~/.local/share/bash-completion/completions/shrug</text>

  <!-- Line 6: Dry run -->
  <text x="20" y="628" class="comment"># Preview without executing</text>
  <text x="20" y="646" class="prompt">$</text>
  <text x="35" y="646" class="cmd">shrug --dry-run jira issues get-issue --issueIdOrKey PROJ-42</text>
  <text x="20" y="665" class="output">DRY RUN: GET https://mysite.atlassian.net/rest/api/3/issue/PROJ-42</text>
</svg>
