name: Bug report
description: Report a bug or unexpected behaviour
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: |
        Minimal steps to reproduce the issue.
        Include the exact command you ran.
      placeholder: |
        1. Run `shrug jira issues list --project FOO`
        2. Observe error...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - shrug version (`shrug --version`)
        - OS and version
        - Shell (bash, zsh, PowerShell, etc.)
      placeholder: |
        - shrug 0.5.0
        - Windows 11 Pro
        - PowerShell 7.4
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Debug output
      description: |
        If applicable, run the command with `--trace` and paste the output.
        Sensitive information (tokens, emails) is automatically masked.
      render: shell
