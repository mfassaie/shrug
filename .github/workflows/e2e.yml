name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: "Atlassian site URL (e.g., mysite.atlassian.net)"
        required: true
        type: string
      jira_project:
        description: "Jira project key for tests"
        required: false
        default: "TEST"
        type: string
      confluence_space:
        description: "Confluence space key for tests"
        required: false
        default: "TEST"
        type: string

permissions:
  contents: read

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RUSTUP_TOOLCHAIN: stable
      SHRUG_E2E_SITE: ${{ inputs.site_url }}
      SHRUG_E2E_EMAIL: ${{ secrets.SHRUG_EMAIL }}
      SHRUG_E2E_TOKEN: ${{ secrets.SHRUG_API_TOKEN }}
      SHRUG_E2E_JIRA_PROJECT: ${{ inputs.jira_project }}
      SHRUG_E2E_CONFLUENCE_SPACE: ${{ inputs.confluence_space }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build shrug
        run: cargo build --release

      - name: Run E2E tests
        run: cargo test --test e2e --release -- --test-threads=1
