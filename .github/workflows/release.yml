name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: stable

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../shrug-${{ matrix.target }}.tar.gz shrug
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/shrug.exe -DestinationPath shrug-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shrug-${{ matrix.target }}
          path: shrug-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Copy installer scripts
        run: |
          cp scripts/install.sh artifacts/install.sh
          cp scripts/install.ps1 artifacts/install.ps1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "shrug ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*

  update-homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Stamp Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_AARCH64_DARWIN=$(sha256sum artifacts/shrug-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_X86_64_DARWIN=$(sha256sum artifacts/shrug-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_X86_64_LINUX=$(sha256sum artifacts/shrug-x86_64-unknown-linux-musl.tar.gz | cut -d' ' -f1)

          sed \
            -e "s/VERSION/$VERSION/g" \
            -e "s/SHA256_AARCH64_APPLE_DARWIN/$SHA_AARCH64_DARWIN/g" \
            -e "s/SHA256_X86_64_APPLE_DARWIN/$SHA_X86_64_DARWIN/g" \
            -e "s/SHA256_X86_64_LINUX_MUSL/$SHA_X86_64_LINUX/g" \
            dist/homebrew/shrug.rb > shrug.rb

      - name: Push to Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/mfassaie/homebrew-tap.git tap
          cp shrug.rb tap/Formula/shrug.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/shrug.rb
          git commit -m "Update shrug to ${GITHUB_REF_NAME}"
          git push

  update-scoop:
    name: Update Scoop Bucket
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Stamp Scoop manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_WINDOWS=$(sha256sum artifacts/shrug-x86_64-pc-windows-msvc.zip | cut -d' ' -f1)

          sed \
            -e "s/VERSION/$VERSION/g" \
            -e "s/SHA256/$SHA_WINDOWS/g" \
            dist/scoop/shrug.json > shrug.json

      - name: Push to Scoop bucket
        env:
          BUCKET_GITHUB_TOKEN: ${{ secrets.BUCKET_GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${BUCKET_GITHUB_TOKEN}@github.com/mfassaie/scoop-bucket.git bucket
          cp shrug.json bucket/bucket/shrug.json
          cd bucket
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/shrug.json
          git commit -m "Update shrug to ${GITHUB_REF_NAME}"
          git push
